worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zone for login / otp to prevent brute force
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;

    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name _;

        # ACME challenge for Certbot Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 1. Main public client / portal (aswaq22.com)
    server {
        listen 443 ssl http2;
        server_name aswaq22.com www.aswaq22.com;

        ssl_certificate /etc/letsencrypt/live/aswaq22.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aswaq22.com/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # 2. Dedicated API subdomain (api.aswaq22.com)
    server {
        listen 443 ssl http2;
        server_name api.aswaq22.com;

        ssl_certificate /etc/letsencrypt/live/aswaq22.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aswaq22.com/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Rate limited auth endpoints
        location /api/v1/auth/ {
            limit_req zone=login_limit burst=10 nodelay;
            proxy_pass http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Grafana Dashboard (Protected with Basic Auth & Path rewrite)
        location /grafana/ {
            auth_basic "Restricted Access";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. Dedicated Admin Dashboard (admin.aswaq22.com)
    server {
        listen 443 ssl http2;
        server_name admin.aswaq22.com;

        ssl_certificate /etc/letsencrypt/live/aswaq22.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aswaq22.com/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://admin:80;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
