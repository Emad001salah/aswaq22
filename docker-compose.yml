

# ─────────────────────────────────────────────────────────
# Aswaq Enterprise – Docker Compose
# Services: App, PostgreSQL, Redis, Meilisearch, Adminer
# Usage:
#   Development: docker compose up
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# ─────────────────────────────────────────────────────────

networks:
  aswaq-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meili_data:
  uploads_data:

services:

  # ── Application ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: aswaq-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV:       production
      CORS_ORIGIN:    "http://localhost:3002,http://localhost:3000,http://localhost:5173"
      DATABASE_URL:   postgresql://${POSTGRES_USER:-aswaq}:${POSTGRES_PASSWORD:-aswaq_secret}@postgres:5432/${POSTGRES_DB:-aswaqdb}
      REDIS_URL:      redis://redis:6379
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      MEILI_HOST:     http://meilisearch:7700
      MEILI_API_KEY:  ${MEILI_MASTER_KEY:-meili_secret_key}
      JWT_SECRET:     ${JWT_SECRET:-change_in_production}
      PEPPER_SECRET:  ${PEPPER_SECRET:-change_in_production}
      PORT:           3000
      LOG_LEVEL:      ${LOG_LEVEL:-info}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - aswaq-net
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout:  10s
      retries:  5

  # ── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aswaq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-aswaq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aswaq_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-aswaqdb}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - aswaq-net
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aswaq} -d ${POSTGRES_DB:-aswaqdb}"]
      interval: 10s
      timeout:  5s
      retries:  5
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c wal_level=replica

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aswaq-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - aswaq-net
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Meilisearch ──────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: aswaq-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY:        ${MEILI_MASTER_KEY:-meili_secret_key}
      MEILI_ENV:               ${NODE_ENV:-development}
      MEILI_HTTP_ADDR:         0.0.0.0:7700
      MEILI_NO_ANALYTICS:      "true"
    volumes:
      - meili_data:/meili_data
    ports:
      - "${MEILI_PORT:-7700}:7700"
    networks:
      - aswaq-net

  # ── Adminer (DB GUI – dev only) ───────────────────────
  adminer:
    image: adminer:latest
    container_name: aswaq-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - aswaq-net
    profiles:
      - dev   # only starts with: docker compose --profile dev up

  # ── Admin Dashboard ──────────────────────────────────
  admin:
    image: nginx:alpine
    container_name: aswaq-admin
    restart: unless-stopped
    ports:
      - "3002:80"
    volumes:
      - ./admin/dist:/usr/share/nginx/html
      - ./admin/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - aswaq-net

  # ── Prometheus ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: aswaq-prometheus
    restart: unless-stopped
    volumes:
      - ./server/data/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app
    networks:
      - aswaq-net

  # ── Grafana ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: aswaq-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./server/data/grafana-dashboard.json:/var/lib/grafana/dashboards/aswaq-dashboard.json
    depends_on:
      - prometheus
    networks:
      - aswaq-net

  # ── k6 Load Testing ──────────────────────────────────
  k6:
    image: grafana/k6:latest
    container_name: aswaq-k6
    volumes:
      - ./tests/load:/tests/load
    environment:
      - E2E_BASE_URL=http://app:3000
    depends_on:
      - app
    networks:
      - aswaq-net
    profiles:
      - tools

  # ── AlertManager ─────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: aswaq-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    volumes:
      - ./server/data/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    depends_on:
      - prometheus
    networks:
      - aswaq-net
    profiles:
      - monitoring   # docker compose --profile monitoring up
