name: 📱 Aswaq — Android Release Build

# ─────────────────────────────────────────────────────────────────────────────
# Builds a signed Android App Bundle (AAB) for Google Play from a git tag.
# Requires repository secrets (see "Required secrets" below).
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags: ['android-v*']
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  NODE_VERSION: '20'
  VITE_API_URL: 'https://aswaq22.com'

jobs:
  build-android:
    name: 🤖 Build signed AAB
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (production)
        run: npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync native Android project
        run: npx cap sync android

      # ── Decode signing keystore from base64 secret ─────────────────────────
      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore

      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          KEYSTORE_FILE=release.keystore
          KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build & sign release AAB
        working-directory: android
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aswaq-android-aab
          path: android/app/build/outputs/**/*.aab
          retention-days: 30
