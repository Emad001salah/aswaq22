name: 🔄 Secrets Rotation

# ─────────────────────────────────────────────────────────────────────────────
# Manual trigger only — never rotate secrets automatically without approval.
# Requires "production" environment approval in GitHub Settings > Environments.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [staging, production]
      component:
        description: 'Which secrets to rotate'
        required: true
        type: choice
        options: [jwt, db, all]
      dry_run:
        description: 'Dry run (no changes applied)'
        required: false
        type: boolean
        default: true

jobs:
  rotate:
    name: 🔑 Rotate ${{ inputs.component }} secrets (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # Requires manual approval for production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: >-
            ${{ inputs.environment == 'production'
                && secrets.AWS_ACCESS_KEY_ID_PROD
                || secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: >-
            ${{ inputs.environment == 'production'
                && secrets.AWS_SECRET_ACCESS_KEY_PROD
                || secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: me-south-1

      - name: Update kubeconfig
        run: |
          CLUSTER=${{ inputs.environment == 'production' && 'aswaq-cluster' || 'aswaq-cluster-staging' }}
          aws eks update-kubeconfig --name $CLUSTER --region me-south-1

      - name: Make rotation script executable
        run: chmod +x scripts/secrets-rotation.sh

      - name: Run secrets rotation
        run: |
          ARGS="--env ${{ inputs.environment }} --component ${{ inputs.component }}"
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          ./scripts/secrets-rotation.sh $ARGS

      - name: Upload rotation log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-rotation-log-${{ inputs.environment }}-${{ github.run_id }}
          path: logs/secrets-rotation-*.log
          retention-days: 90

      - name: Rotation summary
        run: |
          DRY=${{ inputs.dry_run == true && '(DRY RUN — no changes applied)' || '✅ Changes applied' }}
          echo "## 🔑 Secrets Rotation" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Component | ${{ inputs.component }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | $DRY |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
