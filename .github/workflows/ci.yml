name: 🚀 Aswaq — Full CI/CD Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]     # Production deploy gate

# Cancel in-progress runs on the same branch (saves cost)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Global environment
# ─────────────────────────────────────────────────────────────────────────────
env:
  NODE_VERSION: '20'
  REGISTRY:     ghcr.io
  IMAGE_NAME:   ${{ github.repository }}
  HELM_VERSION: '3.15.0'
  TF_VERSION:   '1.8.5'
  TF_WORKING_DIR: terraform

# =============================================================================
# JOB 1 — Lint & Type Check
# =============================================================================
jobs:
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript — strict check
        run: npx tsc --noEmit

# =============================================================================
# JOB 2 — Unit Tests
# =============================================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests (with coverage)
        run: |
          npm test -- \
            --testPathPattern="tests/unit" \
            --passWithNoTests \
            --coverage \
            --coverageDirectory=coverage/unit \
            --forceExit

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: coverage/unit/
          retention-days: 14

# =============================================================================
# JOB 3 — Integration Tests (Postgres + Redis)
# =============================================================================
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     aswaq_ci
          POSTGRES_PASSWORD: ci_secret_123
          POSTGRES_DB:       aswaq_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:        postgresql://aswaq_ci:ci_secret_123@localhost:5432/aswaq_ci
      REDIS_URL:           redis://localhost:6379
      JWT_SECRET:          ci_jwt_secret_not_for_production
      JWT_REFRESH_SECRET:  ci_jwt_refresh_secret_not_for_production
      NODE_ENV:            test
      OTP_DEV_CODE:        "123456"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Push DB schema
        run: npx prisma db push --accept-data-loss

      - name: Run integration tests
        run: |
          npm test -- \
            --testPathPattern="tests/integration" \
            --passWithNoTests \
            --forceExit

# =============================================================================
# JOB 4 — Security Audit (Snyk + npm audit + Trivy)
# =============================================================================
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      contents: read
      security-events: write   # Required for SARIF upload

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── npm audit (built-in, no token needed) ──────────────────────────────
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true   # Report but don't block on known false-positives

      # ── Snyk — dependency + code scan ─────────────────────────────────────
      - name: Snyk — dependency vulnerabilities
        uses: snyk/actions/node@master
        if: ${{ vars.SNYK_ENABLED == 'true' }}
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --severity-threshold=high
            --sarif-file-output=snyk-deps.sarif

      - name: Snyk — SAST (code scan)
        uses: snyk/actions/node@master
        if: ${{ vars.SNYK_ENABLED == 'true' }}
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: >-
            --severity-threshold=high
            --sarif-file-output=snyk-code.sarif

      # ── Trivy — filesystem vulnerability scan ─────────────────────────────
      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:   fs
          scan-ref:    .
          format:      sarif
          output:      trivy-fs.sarif
          severity:    CRITICAL,HIGH
          exit-code:   '0'          # Always continue; results go to Security tab

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif

      # ── IaC Security — tfsec for Terraform ────────────────────────────────
      - name: tfsec — Terraform security scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_WORKING_DIR }}
          format:            sarif
          sarif_file:        tfsec.sarif
          soft_fail:         true

      - name: Upload tfsec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: tfsec.sarif

      # ── Helm lint (structure + template validation) ────────────────────────
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm lint
        run: helm lint helm/ --strict

      - name: Helm template (dry-run render)
        run: |
          helm template aswaq helm/ \
            --set image.tag=sha-test \
            --set env.NODE_ENV=staging \
            --debug \
            > /dev/null

      # ── Upload all security reports ────────────────────────────────────────
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            snyk-deps.sarif
            snyk-code.sarif
            trivy-fs.sarif
            tfsec.sarif
          retention-days: 30

# =============================================================================
# JOB 5 — Build & Push Docker Image
# =============================================================================
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag:    ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      # Enable QEMU for multi-arch (ARM64 for Graviton nodes)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Aswaq API
            org.opencontainers.image.description=Aswaq Marketplace Backend
            org.opencontainers.image.vendor=Aswaq

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v5
        with:
          context:    .
          target:     runner
          platforms:  linux/amd64,linux/arm64
          push:       ${{ github.event_name != 'pull_request' }}
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Admin Image ──────────────────────────────────────────────────────────
      - name: Extract Docker metadata for Admin
        id: meta-admin
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-admin
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Aswaq Admin
            org.opencontainers.image.description=Aswaq Admin Dashboard
            org.opencontainers.image.vendor=Aswaq

      - name: Build and push Admin (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context:    ./admin
          platforms:  linux/amd64,linux/arm64
          push:       ${{ github.event_name != 'pull_request' }}
          tags:       ${{ steps.meta-admin.outputs.tags }}
          labels:     ${{ steps.meta-admin.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Nginx Image ──────────────────────────────────────────────────────────
      - name: Extract Docker metadata for Nginx
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-nginx
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Aswaq Nginx
            org.opencontainers.image.description=Aswaq Nginx Reverse Proxy
            org.opencontainers.image.vendor=Aswaq

      - name: Build and push Nginx (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context:    ./config/nginx
          platforms:  linux/amd64,linux/arm64
          push:       ${{ github.event_name != 'pull_request' }}
          tags:       ${{ steps.meta-nginx.outputs.tags }}
          labels:     ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Trivy — Docker image scan (after build) ───────────────────────────
      - name: Trivy — image vulnerability scan
        uses: aquasecurity/trivy-action@master
        if: github.event_name != 'pull_request'
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format:    sarif
          output:    trivy-image.sarif
          severity:  CRITICAL,HIGH
          exit-code: '0'

      - name: Upload image scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.event_name != 'pull_request'
        with:
          sarif_file: trivy-image.sarif

# =============================================================================
# JOB 6 — Terraform Plan (staging)
# =============================================================================
  terraform-plan:
    name: 🏗️ Terraform Plan (staging)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment: staging
    permissions:
      contents:      read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (staging)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region:            me-south-1

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id:   tf-plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="environment=staging" \
            -var="app_image_tag=${{ needs.build.outputs.image-tag }}" \
            -input=false \
            -no-color \
            -out=tfplan.binary \
            2>&1 | tee tf-plan.txt

      - name: Convert plan to JSON
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-staging
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan.binary
            ${{ env.TF_WORKING_DIR }}/tfplan.json
            ${{ env.TF_WORKING_DIR }}/tf-plan.txt
          retention-days: 7

      # Post plan summary to PR (if applicable)
      - name: Comment Terraform plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/tf-plan.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;
            const body = `## 🏗️ Terraform Plan — staging\n\`\`\`hcl\n${truncated}\n\`\`\``;
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              commit_sha: context.sha,
              body
            });

# =============================================================================
# JOB 7 — Deploy to Staging + k6 Load Test
# =============================================================================
  deploy-staging:
    name: 🧪 Deploy Staging + k6 Load Test
    runs-on: ubuntu-latest
    needs: [build, terraform-plan]
    if: github.event_name != 'pull_request'
    environment:
      name: staging
      url:  https://staging.api.aswaq.sa

    steps:
      - uses: actions/checkout@v4

      # ── Configure kubectl ──────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region:            me-south-1

      - name: Update kubeconfig (staging cluster)
        run: |
          aws eks update-kubeconfig \
            --name aswaq-cluster-staging \
            --region me-south-1

      # ── Helm Deploy ────────────────────────────────────────────────────────
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm lint (final check)
        run: helm lint helm/ --strict

      - name: Helm upgrade --install (staging)
        run: |
          helm upgrade --install aswaq helm/ \
            --namespace aswaq-staging \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            --set env.NODE_ENV=staging \
            --set ingress.hosts[0].host=staging.api.aswaq.sa \
            --set replicaCount=1 \
            --atomic \
            --timeout 5m \
            --wait

      # ── Prisma Migrations ──────────────────────────────────────────────────
      - name: Run Prisma migrations (staging)
        run: |
          POD=$(kubectl get pod \
            -n aswaq-staging \
            -l app.kubernetes.io/name=aswaq \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n aswaq-staging "$POD" -- \
            npx prisma migrate deploy

      # ── Smoke Tests ────────────────────────────────────────────────────────
      - name: Smoke test — /health
        run: |
          echo "Waiting for staging to be ready..."
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://staging.api.aswaq.sa/health --max-time 15)
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Smoke test FAILED (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Smoke test passed"

      - name: Smoke test — /metrics
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://staging.api.aswaq.sa/metrics --max-time 15)
          echo "Metrics endpoint status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ /metrics endpoint FAILED (HTTP $STATUS)"
            exit 1
          fi

      # ── k6 Load Test ────────────────────────────────────────────────────────
      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 load test against staging
        env:
          K6_BASE_URL: https://staging.api.aswaq.sa
          K6_VUS:      50       # Reduced VUs for staging (vs. 200 in prod)
          K6_DURATION: 3m
        run: |
          k6 run tests/load/k6-user-journey.js \
            --out json=k6-results.json \
            --summary-export=k6-summary.json \
            -e BASE_URL=${{ env.K6_BASE_URL }}

      - name: Parse k6 results
        if: always()
        run: |
          echo "## k6 Load Test Results — Staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f k6-summary.json ]; then
            P95=$(cat k6-summary.json | \
              python3 -c "import sys,json; d=json.load(sys.stdin); \
              print(round(d.get('metrics',{}).get('http_req_duration',{}).get('values',{}).get('p(95)',0),2))" 2>/dev/null || echo "N/A")
            ERRORS=$(cat k6-summary.json | \
              python3 -c "import sys,json; d=json.load(sys.stdin); \
              print(d.get('metrics',{}).get('http_req_failed',{}).get('values',{}).get('rate',0))" 2>/dev/null || echo "N/A")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| p95 latency | ${P95}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| Error rate | ${ERRORS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Threshold p95 < 500ms | $([ "$(echo "$P95 < 500" | bc -l 2>/dev/null)" == "1" ] && echo ✅ PASS || echo ❌ FAIL) |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-load-test-results
          path: |
            k6-results.json
            k6-summary.json
          retention-days: 30

      # ── Rollback on failure ────────────────────────────────────────────────
      - name: Rollback staging on failure
        if: failure()
        run: |
          echo "⚠️ Pipeline failed — rolling back staging deployment"
          helm rollback aswaq 0 --namespace aswaq-staging || true
          echo "Rollback triggered"

# =============================================================================
# JOB 8 — OWASP ZAP Security Scan (against staging)
# =============================================================================
  owasp-zap:
    name: 🕷️ OWASP ZAP Scan (staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      # ── Baseline scan (passive, ~2-3 min) ────────────────────────────────
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target:      https://staging.api.aswaq.sa
          rules_file_name: .zap/rules.tsv
          cmd_options: '-I'          # Don't fail on alerts — report only
          artifact_name: zap-baseline-report
        continue-on-error: true

      # ── API scan using OpenAPI spec ────────────────────────────────────────
      - name: ZAP API Scan (OpenAPI)
        uses: zaproxy/action-api-scan@v0.8.0
        with:
          target: https://staging.api.aswaq.sa/api-docs/swagger.json
          format: openapi
          cmd_options: '-I'
          artifact_name: zap-api-report
        continue-on-error: true

      # ── Upload ZAP SARIF to Security tab ──────────────────────────────────
      - name: Upload ZAP SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: zap.sarif
        continue-on-error: true

      - name: ZAP Summary
        if: always()
        run: |
          echo "## 🕷️ OWASP ZAP — Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Report | Download |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Baseline HTML | zap-baseline-report |" >> $GITHUB_STEP_SUMMARY
          echo "| API Scan HTML | zap-api-report |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Full SARIF results available in the GitHub Security tab." >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 9 — Terraform Apply (Production) — Manual Gate
# =============================================================================
  terraform-apply-production:
    name: 🏗️ Terraform Apply (production)
    runs-on: ubuntu-latest
    needs: [deploy-staging, owasp-zap]
    if: github.event_name == 'release'   # Only on tagged releases
    environment:
      name: production                    # Requires manual approval in GitHub Environments
      url:  https://api.aswaq.sa

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (production)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region:            me-south-1

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply (production)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -var="environment=production" \
            -var="app_image_tag=${{ needs.build.outputs.image-tag }}" \
            -input=false \
            -auto-approve

# =============================================================================
# JOB 9 — Deploy to Production — Manual Gate
# =============================================================================
  deploy-production:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: [build, terraform-apply-production]
    if: github.event_name == 'release'
    environment:
      name: production
      url:  https://api.aswaq.sa

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (production)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region:            me-south-1

      - name: Update kubeconfig (production cluster)
        run: |
          aws eks update-kubeconfig \
            --name aswaq-cluster \
            --region me-south-1

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm upgrade --install (production)
        run: |
          helm upgrade --install aswaq helm/ \
            --namespace aswaq \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            --set env.NODE_ENV=production \
            --set replicaCount=2 \
            --atomic \
            --timeout 10m \
            --wait

      - name: Run Prisma migrations (production)
        run: |
          POD=$(kubectl get pod \
            -n aswaq \
            -l app.kubernetes.io/name=aswaq \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n aswaq "$POD" -- \
            npx prisma migrate deploy

      # ── Production health check ────────────────────────────────────────────
      - name: Production health check
        run: |
          sleep 30
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://api.aswaq.sa/health --max-time 15)
            echo "Attempt $i — HTTP $STATUS"
            [ "$STATUS" == "200" ] && echo "✅ Production is healthy" && exit 0
            sleep 15
          done
          echo "❌ Production health check FAILED after 3 attempts"
          exit 1

      # ── Rollback on failure ────────────────────────────────────────────────
      - name: Emergency rollback (production)
        if: failure()
        run: |
          echo "🚨 EMERGENCY ROLLBACK — production deployment failed"
          helm rollback aswaq 0 --namespace aswaq || true

      # ── Release summary ────────────────────────────────────────────────────
      - name: Write deployment summary
        if: success()
        run: |
          echo "## ✅ Aswaq Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ needs.build.outputs.image-digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed at** | \`$(date -u '+%Y-%m-%d %H:%M:%S UTC')\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://api.aswaq.sa |" >> $GITHUB_STEP_SUMMARY
