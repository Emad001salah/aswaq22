services:
  - type: web
    name: aswaq-api
    env: node
    buildCommand: npm install --legacy-peer-deps && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://api.aswaq22.com/api/v1/auth/oauth2/callback
      - key: WEB_RETURN_URL
        value: https://www.aswaq22.com/
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false